# ===============================
# Application identity
# ===============================
# identifies your app in logs, monitoring, and service registries.

spring.application.name=employee-task-attendance-system


# ===============================
# Server Configuration
# ===============================
# sets the port (default is 8080)
server.port=8080



# ===============================
# Database Configuration
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/zaindb?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=zain@1234

# Reduce Hibernate startup logs
logging.level.org.hibernate=warn
#logging.level.org.hibernate.orm.connections.pooling=warn
#logging.level.org.hibernate.engine.jdbc.env.internal=warn

logging.level.org.hibernate.orm.connections.pooling=ERROR
logging.level.org.hibernate.engine.jdbc.env.internal=ERROR





# Connection pool (HikariCP) settings
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=SpringBootHikariCP
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#===============================
# Security / JWT Configuration
# ===============================
# Secret key for signing JWT tokens
jwt.secret=yourSuperSecretKeyHere

# Token expiration time (in milliseconds)
jwt.expiration=86400000   # 1 day



# ===============================
# Spring Security Defaults
# ===============================
# Custom login endpoint
#creates a default in-memory user for quick testing.
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# ===============================
#Enable Swagger UI and set API metadata
# ===============================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html


